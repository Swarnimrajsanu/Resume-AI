# Render Blueprint – SkillScan AI
# https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: skillscan-ai-api
    runtime: node
    plan: starter
    buildCommand: cd Backend && npm install
    startCommand: cd Backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false # set to your frontend URL after deploying
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "false"

  # Frontend Static Site
  - type: static
    name: skillscan-ai-frontend
    buildCommand: cd Frontend && npm install && npm run build
    staticPublishPath: Frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false # set to your backend URL after deploying
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
